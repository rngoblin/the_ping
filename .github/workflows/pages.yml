name: Deploy PING to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare public runtime env
        shell: bash
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail

          if [[ "$SUPABASE_PUBLISHABLE_KEY" == sb_secret* ]]; then
            echo "::error::Refusing to expose a Supabase secret key in the browser bundle. Use NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY."
            exit 1
          fi

          {
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO_NAME"
            echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Build static site
        run: npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
